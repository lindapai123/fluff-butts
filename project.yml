name: FluffButs
options:
  bundleIdPrefix: com.fluffbuts
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FluffButs:
    type: application
    platform: iOS
    sources:
      - FluffButs
    dependencies:
      - sdk: SpriteKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fluffbuts.app
        INFOPLIST_FILE: FluffButs/Info.plist
        DEVELOPMENT_ASSET_PATHS: FluffButs/Preview\ Content
    scheme:
      testTargets: []
